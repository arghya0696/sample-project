name: Python Build and Test

on:
  push:
    branches: '**'
  pull_request:
    branches: '**'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install anthropic requests pytest pytest-cov

      - name: Stage 1 - Print starting
        run: echo "Starting..."

      - name: Stage 2 - Run Tests
        run: |
          mkdir -p reports
          pytest --junitxml=reports/test-results.xml -v

      - name: Stage 3 - AI Self-Healing Agent (Test Failures)
        if: failure()
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          echo "Tests failed. Invoking AI self-healing script..."
          python .github/scripts/self_healer.py

      - name: Stage 4 - Print Result
        if: always()
        run: |
          echo "Done with test. Result: ${{ job.status }}"

  sonar-analysis:
    needs: build-and-test
    runs-on: ubuntu-latest
    environment: manual-sonar-approval

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        run: pip install anthropic requests

      - name: Install sonar-scanner
        run: |
          curl -sSLo /tmp/sonar-scanner.zip \
            https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-5.0.1.3006-linux.zip
          unzip -q /tmp/sonar-scanner.zip -d /opt
          echo "/opt/sonar-scanner-5.0.1.3006-linux/bin" >> $GITHUB_PATH

      - name: AI Sonar Self-Healing Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Running Sonar self-healing..."
          python .github/scripts/sonar_healer.py
