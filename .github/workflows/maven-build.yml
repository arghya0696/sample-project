name: Spring Boot Build and Test

on:
  push:
    branches: '**'
  pull_request:
    branches: '**'
  workflow_dispatch: 

# Added pull-requests: write so the AI can successfully open the PR
permissions:
  contents: write
  pull-requests: write

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  # Job 1: Runs your build, install, and tests automatically
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        run: pip install anthropic requests

      - name: Stage 1 - Print starting
        run: echo "Starting..."

      - name: Stage 2 - Run Maven Clean Install
        run: mvn clean install -DskipTests

      - name: Stage 3 - Run Maven Test
        run: mvn test

      # Runs automatically ONLY if maven test fails
      - name: Stage 5 - AI Self-Healing Agent (Test Failures)
        if: failure()
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          echo "Tests failed. Invoking AI self-healing script..."
          python .github/scripts/self_healer.py

      - name: Stage 6 - Print Result
        if: always()
        run: |
          echo "Done with test. Result: ${{ job.status }}"

  # Job 2: Pauses here and waits for you to click "Approve" in GitHub UI
  sonar-analysis:
    needs: build-and-test
    runs-on: ubuntu-latest
    environment: manual-sonar-approval 
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
  
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ADD THIS STEP TO FIX THE ERROR
      - name: Install Python Dependencies
        run: pip install anthropic requests

      - name: Stage 5 - AI Sonar Self-Healing Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Running Sonar self-healing..."
          python .github/scripts/sonar_healer.py